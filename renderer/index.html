<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: blob: data:; media-src 'self' file:; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>鬼畜活字乱刷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


<header id="titlebar">
  <div id="update-banner" class="hidden"></div>
  <div class="titlebar-left">
    <span id="project-title" class="titlebar-text">鬼畜活字乱刷</span>
  </div>
  <div class="titlebar-center" id="titlebar-editor-tools">
    <select id="play-speed" class="tool-select" title="播放速度">
      <option value="0.25">0.25x</option>
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
    <button id="btn-mute" class="titlebar-btn" title="静音">🔊</button>
  </div>
  <div class="titlebar-right">
    <span id="status-text"></span>
    <div id="progress-wrap" class="hidden">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-text"></span>
    </div>
    <button id="btn-settings" class="titlebar-btn" title="设置">⚙</button>
    <button id="btn-plugins" class="titlebar-btn" title="插件">🔌</button>
    <button id="btn-about" class="titlebar-btn" title="关于">ℹ</button>
    <div id="win-controls">
      <button id="win-min" class="win-btn win-btn-min">_</button>
      <button id="win-max" class="win-btn win-btn-max">□</button>
      <button id="win-close" class="win-btn win-btn-close">✕</button>
    </div>
  </div>
</header>


<div id="view-home">
  <div class="home-container">
    <div class="home-header">
      <h1>鬼畜活字乱刷</h1>
      <p class="home-sub">视频字库编排工具</p>
    </div>
    <div class="home-actions">
      <button id="btn-new-project" class="btn primary home-btn">+ 新建项目</button>
      <button id="btn-plugin-manager" class="btn home-btn" style="font-size:11px;">插件管理</button>
      <button id="btn-ui-pack-manager" class="btn home-btn" style="font-size:11px;">UI包管理</button>
    </div>
    <div id="project-list" class="project-list">
      <div class="project-list-empty">暂无项目</div>
    </div>
  </div>
</div>


<div id="view-editor" class="hidden">
  <div id="editor-layout">
    
    <section id="preview-panel">
      <div id="video-container" class="video-placeholder">
        <video id="video-player" controls preload="auto"></video>
        <div id="placeholder-text">
          <div class="placeholder-icon">🎬</div>
          <p>点击「导入视频」开始</p>
          <p class="sub">支持 mp4 / avi / mov / mkv / webm</p>
        </div>
      </div>
      <div id="timeline-tools">
        <button id="btn-play-all" class="btn small" disabled>播放全部</button>
        <button id="btn-copy-selected" class="btn small" disabled>复制</button>
        <button id="btn-cut-selected" class="btn small" disabled>剪切</button>
        <button id="btn-paste" class="btn small" disabled>粘贴</button>
        <button id="btn-delete-selected" class="btn small danger" disabled>删除选中</button>
        <button id="btn-clear-timeline" class="btn small" disabled>清空时间轴</button>
        <button id="btn-home" class="btn small">← 返回</button>
        <button id="btn-save-project" class="btn small">保存项目</button>
        <button id="btn-import" class="btn small primary">导入视频</button>
        <button id="btn-export" class="btn small success" disabled>导出</button>
        <span id="timeline-count" class="hint">0 个字</span>
      </div>
      <div id="timeline-container">
        <div id="timeline-scroll">
          <div id="timeline"></div>
        </div>
      </div>
    </section>
    
    <aside id="char-panel">
      <div id="char-panel-header">
        <h3>字库</h3>
        <div class="char-search-wrapper">
          <input type="text" id="char-search" placeholder="搜索字...">
        </div>
        <span id="char-count" class="hint">0 字</span>
      </div>
      <div id="char-list"></div>
      
      <div id="video-panel">
        <div id="video-panel-header">
          <h3>视频文件</h3>
          <span id="video-panel-count" class="hint">0</span>
        </div>
        <div id="video-list"></div>
      </div>
    </aside>
  </div>
</div>


<div id="custom-dialog-overlay" class="modal-overlay hidden">
  <div id="custom-dialog-panel" class="modal-panel" style="min-width:360px;">
    <div class="modal-header">
      <h2 id="custom-dialog-title">确认</h2>
      <button id="custom-dialog-close-x" class="icon-btn-small">✕</button>
    </div>
    <div class="modal-body">
      <p id="custom-dialog-message" style="font-size:13px;line-height:1.6;margin-bottom:16px;"></p>
      
      <div id="custom-dialog-checkbox-area" class="hidden" style="margin-bottom:12px;">
        <label id="custom-dialog-checkbox-label" style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
          <input type="checkbox" id="custom-dialog-checkbox">
          <span id="custom-dialog-checkbox-text">选项</span>
        </label>
      </div>
      
      <div id="custom-dialog-input-area" class="hidden" style="margin-bottom:12px;">
        <input type="text" id="custom-dialog-input" style="width:100%;padding:6px 10px;border:1px solid var(--border-sub);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px;outline:none;">
      </div>
      
      <div id="custom-dialog-buttons" style="display:flex;gap:8px;justify-content:flex-end;"></div>
    </div>
  </div>
</div>


<!-- UI Pack 注入点 -->
<style id="ui-pack-style"></style>

<div id="settings-overlay" class="modal-overlay hidden">
  <div id="settings-panel" class="modal-panel">
    <div class="modal-header">
      <h2>偏好设置</h2>
      <button id="btn-settings-close" class="icon-btn-small">✕</button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label>主题模式</label>
        <div class="radio-group">
          <label><input type="radio" name="theme-mode" value="system"> 跟随系统</label>
          <label><input type="radio" name="theme-mode" value="light"> 浅色</label>
          <label><input type="radio" name="theme-mode" value="dark"> 深色</label>
        </div>
      </div>
      <div class="setting-group">
        <label>主题色</label>
        <div class="color-picker-row">
          <input type="color" id="setting-accent" value="#e94560">
          <span class="color-label">强调色</span>
        </div>
        <div class="color-picker-row">
          <input type="color" id="setting-bg" value="#1a1a2e">
          <span class="color-label">背景色</span>
        </div>
      </div>
      <div class="setting-group">
        <label>批量切割</label>
        <div class="setting-input-row">
          <label style="font-size:12px;color:var(--text);">同时切</label>
          <input type="number" id="setting-batch-concurrency" min="1" value="1">
          <span class="setting-hint">个片段（越大越快但占CPU）</span>
        </div>
      </div>
      <div class="setting-group">
        <label>UI包</label>
        <div class="setting-input-row">
          <select id="setting-ui-pack" style="flex:1;padding:3px 6px;border:1px solid var(--border-sub);border-radius:3px;background:var(--input-bg);color:var(--text);font-size:12px;">
            <option value="">默认主题</option>
          </select>
          <button id="btn-refresh-ui-packs" class="icon-btn-small" style="font-size:12px;padding:2px 8px;border:1px solid var(--border-sub);border-radius:3px;">🔄</button>
        </div>
      </div>
      <div class="setting-group" style="opacity:0.4;font-size:11px;border-top:1px solid var(--border-sub);padding-top:12px;margin-top:12px;">
        <div style="display:flex;align-items:center;gap:8px;color:var(--text-muted);">
          <span>🔧 开发者</span>
          <button id="btn-open-log" class="icon-btn-small" style="font-size:11px;padding:2px 8px;border:1px solid var(--border-sub);border-radius:3px;">📋 打开日志</button>
        </div>
      </div>
    </div>
  </div>
</div>


<div id="about-overlay" class="modal-overlay hidden">
  <div id="about-panel" class="modal-panel" style="max-width:600px;height:80vh;display:flex;flex-direction:column;">
    <div class="modal-header">
      <div id="about-tabs" class="tab-bar">
        <button class="tab-btn active" data-page="about">关于</button>
        <button class="tab-btn" data-page="sdk">SDK接入</button>
        <button class="tab-btn" data-page="privacy">隐私协议</button>
        <button class="tab-btn" data-page="terms">服务条款</button>
      </div>
      <button id="btn-about-close" class="icon-btn-small">✕</button>
    </div>
    <div id="about-content" class="modal-body" style="flex:1;overflow-y:auto;font-size:12px;line-height:1.8;white-space:pre-wrap;"></div>
  </div>
</div>


<div id="plugin-overlay" class="modal-overlay hidden">
  <div id="plugin-panel" class="modal-panel" style="max-width:500px;height:70vh;display:flex;flex-direction:column;">
    <div class="modal-header">
      <h2 id="plugin-manager-title">插件管理</h2>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btn-plugin-import-zip" class="btn small primary">导入 .zip</button>
        <button id="btn-plugin-import" class="btn small" style="font-size:10px;">导入文件夹</button>
        <button id="btn-plugin-close" class="icon-btn-small">✕</button>
      </div>
    </div>
    <div id="plugin-list-container" class="modal-body" style="flex:1;overflow-y:auto;padding:12px 18px;"></div>
  </div>
</div>


<div id="ui-pack-overlay" class="modal-overlay hidden">
  <div id="ui-pack-panel" class="modal-panel" style="max-width:500px;height:70vh;display:flex;flex-direction:column;">
    <div class="modal-header">
      <h2>UI包管理</h2>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btn-ui-pack-import" class="btn small primary">导入 .zip</button>
        <button id="btn-ui-pack-close" class="icon-btn-small">✕</button>
      </div>
    </div>
    <div id="ui-pack-list-container" class="modal-body" style="flex:1;overflow-y:auto;padding:12px 18px;"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
