<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>鬼畜活字乱刷 — 录屏用</title>
<style>
/* 使用软件实际 CSS 变量 */
:root{--bg:#1a1a2e;--surface:#16213e;--border:#0f3460;--border-sub:#333;--text:#e0e0e0;--text-dim:#888;--text-muted:#666;--accent:#e94560;--btn-bg:#2a2a4a;--btn-text:#ccc;--char-bg:#1a2a3a;--char-border:#2a4a5a;--timeline-bg:#12122a;--timeline-border:#2a2a4a;--timeline-char-bg:#2a1a3a;--timeline-char-border:#4a2a5a;--modal-overlay:rgba(0,0,0,0.6);--modal-bg:#16213e;--input-bg:#1a1a2e;--titlebar-bg:#0f0f1e}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}
.app{display:flex;flex-direction:column;height:100vh}

/* Titlebar */
.titlebar{display:flex;align-items:center;justify-content:space-between;height:36px;background:var(--titlebar-bg);-webkit-app-region:drag;flex-shrink:0;padding:0 8px}
.titlebar-left{display:flex;align-items:center;padding-left:14px}
.titlebar-text{font-size:13px;font-weight:600;color:var(--text-dim)}
.titlebar-center{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
.titlebar-btn{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:3px}
.titlebar-right{display:flex;align-items:center}
.win-btn{width:46px;height:36px;border:none;background:transparent;font-size:12px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.win-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.win-btn-close:hover{background:#e81123;color:#fff}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}
.main-left{display:flex;flex-direction:column;flex:1;min-width:0}
.video-area{flex:1;display:flex;align-items:center;justify-content:center;background:#000;margin:6px;border-radius:6px;position:relative;min-height:200px;border:1px solid var(--border-sub)}
.video-placeholder{text-align:center;color:var(--text-muted)}
.video-placeholder .big-icon{font-size:48px;margin-bottom:8px;opacity:.6}
.video-placeholder .sub{font-size:11px;margin-top:4px;opacity:.6}
#timeline-tools{display:flex;align-items:center;gap:6px;padding:6px 4px 2px;border-top:1px solid var(--border-sub);margin-top:6px}
.btn{padding:4px 12px;border:1px solid var(--border-sub);border-radius:4px;background:var(--btn-bg);color:var(--btn-text);font-size:11px;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.timeline-wrap{padding:6px}
#timeline-container{background:var(--timeline-bg);border:1px solid var(--timeline-border);border-radius:5px;padding:6px;display:flex;gap:4px;min-height:50px;align-items:center;overflow-x:auto}
.timeline-char{background:var(--timeline-char-bg);border:1px solid var(--timeline-char-border);border-radius:5px;padding:6px 10px;display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;position:relative}
.timeline-char .char-text{font-size:18px;font-weight:700;color:var(--text);line-height:1}
.timeline-char .char-index{font-size:8px;color:var(--text-dim);position:absolute;top:1px;left:3px}
.timeline-char.selected{border-color:var(--accent);box-shadow:0 0 6px rgba(233,69,96,.4)}
.timeline-wait{background:#2a3a2a;border-color:#3a5a3a}
.hint{font-size:11px;color:var(--text-muted);margin-left:auto}

/* Character panel */
#char-panel{width:220px;min-width:220px;background:var(--timeline-bg);border-left:1px solid var(--border-sub);display:flex;flex-direction:column;overflow:hidden}
#char-panel-header{padding:10px;border-bottom:1px solid var(--border-sub);flex-shrink:0}
#char-panel-header h3{font-size:14px;color:var(--accent);margin-bottom:6px}
.char-search-wrapper input{width:100%;padding:4px 8px;border:1px solid var(--border-sub);border-radius:3px;background:var(--input-bg);color:var(--text);font-size:12px;outline:none}
.char-search-wrapper input:focus{border-color:var(--accent)}
#char-count{padding:0 10px 2px;font-size:11px;color:var(--text-muted)}
#char-list{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.char-btn{width:42px;height:42px;background:var(--char-bg);border:1px solid var(--char-border);border-radius:5px;cursor:pointer;font-size:18px;font-weight:700;color:var(--text);font-family:'Microsoft YaHei','SimHei','Segoe UI',sans-serif;line-height:1;padding:0;transition:all .1s}
.char-btn:hover{border-color:var(--accent);transform:scale(1.08);background:var(--timeline-char-bg)}

/* Progress */
#progress-wrap{display:flex;align-items:center;gap:6px;padding:0 8px}
#progress-bar{width:80px;height:4px;background:var(--border-sub);border-radius:2px;overflow:hidden}
#progress-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s}
#progress-text{font-size:10px;color:var(--text-dim);white-space:nowrap}

/* Video files panel */
#video-panel{border-top:1px solid var(--border-sub);flex-shrink:0;max-height:100px;display:flex;flex-direction:column}
#video-panel-header{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border-bottom:1px solid var(--border-sub)}
#video-panel-header h3{font-size:12px;color:var(--accent)}
.video-item{display:flex;align-items:center;gap:8px;padding:3px 8px;border:1px solid transparent;border-radius:4px;font-size:11px}

/* Scene overlays for the promo video */
.scene-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .8s}
.scene-overlay.active{opacity:1}
.scene-tag{background:rgba(233,69,96,.15);border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}

/* Screenshot stage classes */
.stage-char-panel .char-col .char-btn{animation:charPop .3s both}
.char-col{display:flex;gap:4px;margin:2px 0}
@keyframes charPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Titlebar -->
  <div class="titlebar">
    <div class="titlebar-left"><span class="titlebar-text">鬼畜活字乱刷</span></div>
    <div class="titlebar-center">
      <button class="titlebar-btn">🏠</button>
      <button class="titlebar-btn">💾</button>
      <button class="titlebar-btn">📂</button>
      <button class="titlebar-btn">📤</button>
      <div id="progress-wrap"><div id="progress-bar"><div id="progress-fill" style="width:67%"></div></div><span id="progress-text" style="color:var(--text-dim);font-size:10px">识别中 67%</span></div>
      <span id="status-text" style="color:#e9a545;font-size:11px;padding:0 8px">导入中...</span>
      <button class="titlebar-btn">⚙</button>
    </div>
    <div class="titlebar-right">
      <div class="win-btn">─</div><div class="win-btn">□</div><div class="win-btn win-btn-close">✕</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-left">
      <!-- Video area -->
      <div class="video-area">
        <div class="video-placeholder" id="placeholder">
          <div class="big-icon">🎬</div>
          <div style="font-size:14px;font-weight:600">demo_video.mp4</div>
          <div class="sub">已导入 · 共识别 32 个字</div>
        </div>
        <div class="scene-overlay" id="sceneSpeech">
          <div style="text-align:center">
            <div style="font-size:36px;margin-bottom:8px">🎤</div>
            <div style="font-size:16px;font-weight:600;color:var(--accent)">语音识别中...</div>
            <div class="scene-tag">Whisper 逐字时间戳</div>
          </div>
        </div>
        <div class="scene-overlay" id="sceneCut">
          <div style="text-align:center">
            <div style="font-size:36px;margin-bottom:8px">✂️</div>
            <div style="font-size:16px;font-weight:600;color:var(--accent)">批量切割中</div>
            <div class="scene-tag">并发 4 线程 · 共 47 个片段</div>
          </div>
        </div>
        <div class="scene-overlay" id="sceneDone">
          <div style="text-align:center">
            <div style="font-size:36px;margin-bottom:8px">✅</div>
            <div style="font-size:16px;font-weight:600;color:var(--accent)">导入完成</div>
            <div class="scene-tag">识别到 32 个不同字 · 47 个片段</div>
          </div>
        </div>
      </div>

      <!-- Timeline tools -->
      <div id="timeline-tools">
        <button class="btn primary">▶ 播放全部</button>
        <button class="btn">📤 导出</button>
        <button class="btn">✕ 清空</button>
        <button class="btn">📋 复制</button>
        <button class="btn">✂️ 剪切</button>
        <button class="btn">📌 粘贴</button>
        <span class="hint">共 8 个字 · 点击字块可选中</span>
      </div>

      <!-- Timeline -->
      <div class="timeline-wrap">
        <div id="timeline-container">
          <div class="timeline-char selected"><span class="char-index">1</span><span class="char-text">你</span></div>
          <div class="timeline-char"><span class="char-index">2</span><span class="char-text">好</span></div>
          <div class="timeline-char"><span class="char-index">3</span><span class="char-text">啊</span></div>
          <div class="timeline-char"><span class="char-index">4</span><span class="char-text">鬼</span></div>
          <div class="timeline-char"><span class="char-index">5</span><span class="char-text">畜</span></div>
          <div class="timeline-char"><span class="char-index">6</span><span class="char-text">活</span></div>
          <div class="timeline-char"><span class="char-index">7</span><span class="char-text">字</span></div>
          <div class="timeline-char"><span class="char-index">8</span><span class="char-text">刷</span></div>
        </div>
      </div>

      <!-- Video panel -->
      <div id="video-panel">
        <div id="video-panel-header"><h3>📁 视频文件</h3><span style="font-size:10px;color:var(--text-muted)">1 个视频</span></div>
        <div class="video-item"><span class="video-item-name">demo_video.mp4</span></div>
      </div>
    </div>

    <!-- Right: Character Panel -->
    <div id="char-panel">
      <div id="char-panel-header">
        <h3>📖 字库</h3>
        <div class="char-search-wrapper"><input placeholder="搜索字体..." value=""></div>
      </div>
      <div id="char-count">共 32 个不同字</div>
      <div id="char-list" id="charList">
        <div class="char-col" id="charRow">
          <button class="char-btn" style="color:#4a8cff">你</button>
          <button class="char-btn" style="color:#e94560">好</button>
          <button class="char-btn" style="color:#4aaf50">啊</button>
          <button class="char-btn" style="color:#e9a545">鬼</button>
          <button class="char-btn" style="color:#9b59b6">畜</button>
          <button class="char-btn" style="color:#1abc9c">活</button>
          <button class="char-btn" style="color:#3498db">字</button>
          <button class="char-btn" style="color:#e74c3c">刷</button>
          <button class="char-btn" style="color:#f39c12">视</button>
          <button class="char-btn" style="color:#2ecc71">频</button>
        </div>
        <div class="char-col">
          <button class="char-btn" style="color:#8e44ad">剪</button>
          <button class="char-btn" style="color:#d35400">辑</button>
          <button class="char-btn" style="color:#2980b9">制</button>
          <button class="char-btn" style="color:#c0392b">作</button>
          <button class="char-btn" style="color:#27ae60">工</button>
          <button class="char-btn" style="color:#f1c40f">具</button>
          <button class="char-btn" style="color:#16a085">音</button>
          <button class="char-btn" style="color:#e67e22">频</button>
          <button class="char-btn" style="color:#7f8c8d">导</button>
          <button class="char-btn" style="color:#34495e">出</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Auto cycle overlay scenes for screenshots
const overlays = ['sceneSpeech','sceneCut','sceneDone'];
let oi = 0;
function showOverlay(idx){
  overlays.forEach(o => document.getElementById(o).classList.remove('active'));
  if(idx >= 0 && idx < overlays.length) document.getElementById(overlays[idx]).classList.add('active');
}
// Start with speech scene
showOverlay(0);
// Cycle every 2s for screenshots
setInterval(() => { oi = (oi + 1) % overlays.length; showOverlay(oi); }, 2000);
// Progress bar animation
let pw = 10;
setInterval(() => { pw = pw >= 100 ? 10 : pw + 1; document.getElementById('progress-fill').style.width = pw + '%'; }, 100);
</script>
</body>
</html>
